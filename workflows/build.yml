name: Build RE-SS-01 SPI ImmortalWrt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install -y build-essential flex bison gawk gcc-multilib g++-multilib \
          gettext libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Prepare OpenWrt Source
        run: |
          git clone https://github.com/VIKINGYFY/immortalwrt.git openwrt
          cd openwrt
          git checkout qualcommax-6.6
          cd ..

      - name: Import Config & Custom Files
        run: |
          cp ./jdcloud_re-ss-01/.config ./openwrt/.config
          cp -r ./jdcloud_re-ss-01/files/* ./openwrt/

      - name: Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: Download Packages
        run: |
          cd openwrt
          make download -j8 V=s

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RE-SS-01-SPI-Firmware
          path: openwrt/bin/targets/qualcommax/ipq60xx/*.bin
